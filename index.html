*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

#app {
  position: fixed;
  top: 0; bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  overflow: hidden;
}

.screen {
  position: absolute; inset: 0;
  background: #000;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.screen.active { opacity: 1; pointer-events: all; }

/* ══ HOME ══ */
#home { cursor: pointer; }
.home-block { position: absolute; right: 22px; top: 36.25vh; text-align: right; }
.home-decided { display: block; font-family: 'Share', sans-serif; font-weight: 700; font-size: clamp(52px, 20vw, 100px); line-height: 1; letter-spacing: -0.02em; text-transform: uppercase; white-space: nowrap; color: rgba(255,255,255,0.6); }
.home-now { display: block; font-family: 'Share', sans-serif; font-weight: 700; font-size: clamp(52px, 20vw, 100px); line-height: 1; letter-spacing: -0.02em; text-transform: uppercase; white-space: nowrap; color: #FFC700; }
.home-tagline { display: block; font-family: 'Share', sans-serif; font-weight: 400; font-size: clamp(16px, 4vw, 24px); color: rgba(255,255,255,0.6); margin-top: 8px; }

/* ══ CINEFILO ══ */
.cinefilo-block { position: absolute; right: 22px; top: 36.25vh; text-align: right; }
.cinefilo-word { display: block; font-family: 'Share', sans-serif; font-weight: 700; font-size: clamp(52px, 20vw, 100px); line-height: 1; letter-spacing: -0.02em; text-transform: uppercase; white-space: nowrap; color: rgba(255,255,255,0.6); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: color 0.12s, transform 0.08s; }
.cinefilo-word:active { transform: scale(0.96); }
.cinefilo-word.on { color: #FFC700; }

/* ══ PLATAFORMAS ══
   Figma exacto: frame 390x844
   tiles 120x120px, rounded 18px
   col izq: left=56px, col der: left=214px
   rows top: 80, 222, 364, 506, 644px
   gap h=38px, gap v=22px
*/
#plataformas {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.plat-grid {
  display: grid;
  grid-template-columns: 120px 120px;
  grid-template-rows: repeat(5, 120px);
  gap: 22px 38px;
  transform-origin: center center;
  transform: scale(clamp(0.72, calc((100dvh - 40px) / 730px), 1));
}

.plat-tile {
  width: 120px;
  height: 120px;
  border-radius: 18px;
  background: #1c1c1e;
  border: 2px solid transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 22px;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.12s, box-shadow 0.12s, transform 0.08s;
}
.plat-tile:active { transform: scale(0.94); }

.plat-tile img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  filter: grayscale(1) brightness(10);
  opacity: 0.6;
  transition: opacity 0.12s;
}

.plat-tile.on {
  border-color: #FFC700;
  box-shadow: 0 0 0 1px #FFC700, 0 0 22px rgba(255,199,0,0.55);
}
.plat-tile.on img {
  opacity: 1;
}

/* ══ ANIMO ══ */
#animo { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; padding: 0 22px 90px 0; }
.animo-block { text-align: right; }
.mood-word { display: block; font-family: 'Share', sans-serif; font-weight: 700; font-size: clamp(44px, 15vw, 75px); line-height: 1; letter-spacing: -0.02em; text-transform: uppercase; white-space: nowrap; color: rgba(255,255,255,0.6); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: color 0.12s, transform 0.08s; }
.mood-word:active { transform: scale(0.96); }
.mood-word.on { color: #FFC700; }
.fmt-toggle { position: absolute; bottom: max(36px, env(safe-area-inset-bottom, 36px)); left: 50%; transform: translateX(-50%); width: 240px; height: 52px; border: 1px solid rgba(255,255,255,0.6); border-radius: 100px; display: flex; align-items: center; justify-content: center; gap: 21px; }
.fmt-btn { font-family: 'Share', sans-serif; font-weight: 400; font-size: 30px; text-transform: uppercase; background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; width: 83px; text-align: center; -webkit-tap-highlight-color: transparent; transition: color 0.12s, transform 0.08s; padding: 0; line-height: 1; }
.fmt-btn:active { transform: scale(0.93); }
.fmt-btn.on { color: #FFC700; }


/* ══ PELICULA ══ */
#pelicula { display: flex; flex-direction: column; padding: max(52px, env(safe-area-inset-top, 52px)) 18px 0; }
.poster-wrap {
  flex: 0 0 auto; height: 50vh; aspect-ratio: 336 / 482; align-self: center;
  margin-bottom: 18px;
  overflow: hidden;
  border-radius: 18px;
  border: 2px solid #FFC700;
  box-shadow: 0 0 16px rgba(255,215,0,0.85);
  display: block; text-decoration: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent; transition: transform 0.08s;
}
.poster-wrap:active { transform: scale(0.97); }
.movie-title-text {
  font-family: 'Share', sans-serif; font-weight: 700; font-size: 20px;
  color: #fff; text-align: center; text-transform: uppercase;
  letter-spacing: 0.02em; line-height: 1.15; margin: 0;
}
.movie-year-text {
  font-family: 'Share', sans-serif; font-weight: 400; font-size: 13px;
  color: rgba(255,255,255,0.45); text-align: center; letter-spacing: 0.08em;
  margin: 0;
}
.poster-wrap { background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); position: relative; }
.poster-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 16px; transition: opacity 0.3s; }
/* shimmer mientras carga el poster */
@keyframes posterShimmer { 0%,100%{opacity:.55} 50%{opacity:.85} }
.poster-wrap.img-loading { animation: posterShimmer 1.4s ease-in-out infinite; }
/* icono de cámara cuando falla la imagen */
.poster-wrap.img-error::after {
  content: '🎬'; font-size: 48px; position: absolute;
  top:50%; left:50%; transform:translate(-50%,-50%);
  opacity:.4; pointer-events:none;
}
.movie-footer {
  flex: 1 1 auto;
  background: #000;
  padding: 28px 24px max(32px, env(safe-area-inset-bottom, 32px));
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.its-decided { font-family: 'Share', sans-serif; font-weight: 400; font-size: 22px; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 0.05em; }
.watch-btn {
  font-family: 'Share', sans-serif; font-weight: 400; font-size: 17px;
  color: #FFC700; text-shadow: 0 0 12px rgba(255,199,0,0.65);
  border: 1.5px solid rgba(255,255,255,0.6); border-radius: 100px;
  padding: 13px 30px; background: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent; transition: transform 0.08s;
  text-decoration: none; text-align: center; text-transform: uppercase;
  letter-spacing: 0.03em; display: inline-block;
}
.watch-btn:active { transform: scale(0.94); }
.seen-it {
  font-family: 'Share', sans-serif; font-weight: 400; font-size: 13px;
  color: rgba(255,255,255,0.5); text-transform: uppercase; cursor: pointer;
  letter-spacing: 0.06em; -webkit-tap-highlight-color: transparent; padding: 6px 0;
}

/* ══ PAYWALL ══ */
#paywall { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; text-align: center; }
.pw-stop { font-family: 'Share', sans-serif; font-weight: 700; font-size: 46px; line-height: 1.05; letter-spacing: -0.02em; color: #FFC700; text-transform: uppercase; margin-bottom: 18px; }
.pw-sub { font-family: 'Share', sans-serif; font-weight: 400; font-size: 17px; color: rgba(255,255,255,0.6); line-height: 1.55; margin-bottom: 32px; }
.pw-price { font-family: 'Share', sans-serif; font-weight: 700; font-size: 54px; color: #fff; line-height: 1; margin-bottom: 6px; }
.pw-once { font-family: 'Share', sans-serif; font-weight: 400; font-size: 12px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 32px; }
.pw-features { font-family: 'Share', sans-serif; font-weight: 400; font-size: 15px; color: rgba(255,255,255,0.5); margin-bottom: 40px; line-height: 2; list-style: none; padding: 0; }
.pw-btn { font-family: 'Share', sans-serif; font-weight: 700; font-size: 18px; color: #000; background: #FFC700; border: none; border-radius: 100px; padding: 18px 44px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.08s; text-transform: uppercase; letter-spacing: 0.03em; }
.pw-btn:active { transform: scale(0.94); }

/* ══ TV / LANDSCAPE ══ */
/* Remove default focus outline; show only with keyboard */
* { outline: none; }
body.keyboard-nav .cinefilo-word:focus,
body.keyboard-nav .plat-tile:focus,
body.keyboard-nav .mood-word:focus,
body.keyboard-nav .fmt-btn:focus,
body.keyboard-nav .watch-btn:focus,
body.keyboard-nav .seen-it:focus,
body.keyboard-nav #poster-link:focus {
  outline: 4px solid #FFC700;
  outline-offset: 10px;
  border-radius: 8px;
}
@media screen and (orientation: landscape) and (min-width: 900px) {
  #app { max-width: 100vw; left: 0; transform: none; }
  /* HOME */
  .home-block { right: 6vw; top: 50%; transform: translateY(-50%); }
  .home-decided, .home-now, .cinefilo-word { font-size: clamp(80px, 12vw, 200px); }
  .home-tagline { font-size: clamp(18px, 2.2vw, 36px); }
  /* CINEFILO */
  .cinefilo-block { right: 6vw; top: 50%; transform: translateY(-50%); }
  /* PLATFORMS — 5 columns x 2 rows */
  .plat-grid {
    grid-template-columns: repeat(5, 120px);
    grid-template-rows: repeat(2, 120px);
    transform: scale(clamp(0.7, calc(100vw / 900px), 1.6));
  }
  /* ANIMO */
  #animo { padding: 0 6vw 6vh 0; }
  .mood-word { font-size: clamp(60px, 9vw, 140px); }
  .fmt-toggle { bottom: 5vh; }
  /* PELICULA — poster left, info right */
  #pelicula { flex-direction: row; padding: 40px 60px; gap: 50px; align-items: center; }
  .poster-wrap { height: clamp(300px, 78vh, 700px); width: auto; margin-bottom: 0; }
  .movie-footer { flex: 1; padding: 0; align-items: flex-start; gap: 20px; }
  .movie-title-text { font-size: clamp(22px, 3.5vw, 56px); text-align: left; }
  .movie-year-text  { font-size: clamp(14px, 1.8vw, 26px); text-align: left; }
  .watch-btn { font-size: clamp(16px, 2.2vw, 32px); padding: 18px 44px; }
  .seen-it   { font-size: clamp(14px, 1.8vw, 26px); }
}#home-btn {
  display: none;
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 1000;
  background: rgba(255,255,255,0.08);
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: rgba(255,255,255,0.5);
  transition: background .2s, color .2s;
}
#home-btn:hover { background: rgba(255,255,255,0.18); color: #FFC700; }
#home-btn.visible { display: flex; }
</style>
</head>

const PLAT_NAMES = {
  netflix:'NETFLIX', apple:'APPLE TV+', hulu:'HULU',
  disney:'DISNEY+', amazon:'PRIME VIDEO', hbo:'MAX',
  mubi:'MUBI', mercado:'MERCADO PLAY', paramount:'PARAMOUNT+', pluto:'PLUTO TV'
};

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  var btn = document.getElementById('home-btn');
  if (btn) { id === 'home' ? btn.classList.remove('visible') : btn.classList.add('visible'); }
}


function pickDepth(e, d) {
  e.stopPropagation();
  if (navigator.vibrate) navigator.vibrate(8);
  S.depth = d;
  document.getElementById('opt-light').classList.toggle('on', d === 'light');
  document.getElementById('opt-deep').classList.toggle('on', d === 'deep');
  setTimeout(() => goTo('plataformas'), 220);
}

function togPlat(tile, p) {
  if (navigator.vibrate) navigator.vibrate(8);
  if (S.platforms.has(p)) {
    S.platforms.delete(p);
    tile.classList.remove('on');
  } else {
    S.platforms.add(p);
    tile.classList.add('on');
    if (S.platforms.size === 1) setTimeout(() => goTo('animo'), 500);
  }
}

function pickMood(el, mood) {
  if (navigator.vibrate) navigator.vibrate(8);
  document.querySelectorAll('.mood-word').forEach(m => m.classList.remove('on'));
  el.classList.add('on');
  S.mood = mood;
  setTimeout(showDecision, 280);
}

function pickFmt(f) {
  S.format = f;
  document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('f-' + f).classList.add('on');
}

function getRecommendations() {
  const plats = [...S.platforms];
  let r;
  // Full match
  r = CATALOG.filter(m => m.format===S.format && m.depth===S.depth && m.moods.includes(S.mood) && m.platforms.some(p=>plats.includes(p)));
  if (r.length) return r;
  // Relax depth
  r = CATALOG.filter(m => m.format===S.format && m.moods.includes(S.mood) && m.platforms.some(p=>plats.includes(p)));
  if (r.length) return r;
  // Relax platform
  r = CATALOG.filter(m => m.format===S.format && m.depth===S.depth && m.moods.includes(S.mood));
  if (r.length) return r;
  // Relax mood
  r = CATALOG.filter(m => m.format===S.format && m.depth===S.depth);
  if (r.length) return r;
  return CATALOG;
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function saveUses() { try { localStorage.setItem('dn_uses', usageCount); } catch(e) {} }

function showDecision() {
  if (!paid) {
    usageCount++;
    saveUses();
    if (usageCount > 2) { goTo('paywall'); return; }
  }
  filteredList = shuffle(getRecommendations());
  currentIdx = 0;
  renderRec(filteredList[0]);
  goTo('pelicula');
}

function nextRec() {
  if (navigator.vibrate) navigator.vibrate(8);
  if (!paid) {
    usageCount++;
    saveUses();
    if (usageCount > 2) { goTo('paywall'); return; }
  }
  currentIdx = (currentIdx + 1) % filteredList.length;
  renderRec(filteredList[currentIdx]);
}

function renderRec(movie) {
  var img  = document.getElementById('movie-poster');
  var wrap = document.getElementById('poster-link');

  // Limpia estados anteriores
  wrap.classList.remove('img-loading', 'img-error');

  img.onload = function() {
    this.style.opacity = '1';
    wrap.classList.remove('img-loading', 'img-error');
  };
  img.onerror = function() {
    this.style.opacity = '0';
    wrap.classList.remove('img-loading');
    wrap.classList.add('img-error');
  };

  // Si el src cambia → fade out + shimmer mientras carga
  if (img.src !== movie.poster) {
    img.style.opacity = '0';
    wrap.classList.add('img-loading');
  }

  img.alt = movie.title;
  img.src = movie.poster;

  // Ya estaba en caché → mostrar inmediatamente
  if (img.complete && img.naturalWidth > 0) {
    img.style.opacity = '1';
    wrap.classList.remove('img-loading', 'img-error');
  }

  document.getElementById('movie-title-text').textContent = movie.title;
  document.getElementById('movie-year-text').textContent = movie.year + '  /  ' + (movie.format === 'series' ? 'SERIES' : 'MOVIE');
  const plats = [...S.platforms];
  let avail = movie.platforms.find(p => plats.includes(p)) || movie.platforms[0];
  // Hulu es solo USA — si el contenido también está en Disney+, usar Disney+ como fallback
  if (avail === 'hulu' && movie.links && movie.links.disney) { avail = 'disney'; }
  const watchUrl = (movie.links && movie.links[avail]) || '#';
  const link = document.getElementById('watch-link');
  link.textContent = 'WATCH ON ' + (PLAT_NAMES[avail] || avail.toUpperCase()) + '.';
  link.href = watchUrl;
  wrap.href = watchUrl;
}

function buyNow() {
  if (navigator.vibrate) navigator.vibrate(8);
  alert('Stripe checkout — coming soon!');
}

// ── TV / KEYBOARD NAVIGATION ─────────────────────────────────
(function() {
  function makeFocusable() {
    document.querySelectorAll('#home, .cinefilo-word, .mood-word, .seen-it')
      .forEach(function(el){ if (!el.getAttribute('tabindex')) el.setAttribute('tabindex','0'); });
  }
  setTimeout(makeFocusable, 100);

  function getFocusables(screen) {
    if (!screen) return [];
    if (screen.id === 'home') return [screen];
    return Array.from(screen.querySelectorAll(
      '.cinefilo-word, .plat-tile, .mood-word, .fmt-btn, .watch-btn, .seen-it, #poster-link'
    )).filter(function(el){ return getComputedStyle(el).display !== 'none'; });
  }

  var _goTo = goTo;
  window.goTo = function(id) {
    _goTo(id);
    setTimeout(function(){
      if (document.body.classList.contains('keyboard-nav')) {
        var els = getFocusables(document.getElementById(id));
        if (els[0]) els[0].focus();
      }
    }, 260);
  };

  document.addEventListener('keydown', function(e) {
    var screen = document.querySelector('.screen.active');
    if (!screen) return;
    var els   = getFocusables(screen);
    var focus = document.activeElement;
    var idx   = els.indexOf(focus);

    switch (e.key) {
      case 'Enter': case ' ':
        e.preventDefault();
        document.body.classList.add('keyboard-nav');
        if (focus && screen.contains(focus)) { focus.click(); }
        else if (screen.id === 'home') { screen.click(); }
        else if (els[0]) { els[0].focus(); }
        break;
      case 'ArrowRight': case 'ArrowDown':
        e.preventDefault();
        document.body.classList.add('keyboard-nav');
        if (screen.id === 'pelicula' && e.key === 'ArrowRight') { nextRec(); return; }
        els[idx < els.length - 1 ? idx + 1 : 0].focus();
        break;
      case 'ArrowLeft': case 'ArrowUp':
        e.preventDefault();
        document.body.classList.add('keyboard-nav');
        if (idx > 0) els[idx - 1].focus(); else els[els.length - 1].focus();
        break;
      case 'Backspace': case 'Escape':
        e.preventDefault();
        S.depth = null; S.platforms.clear(); S.mood = null; S.format = 'movie';
        document.querySelectorAll('.plat-tile,.cinefilo-word,.mood-word,.fmt-btn').forEach(function(el){ el.classList.remove('on'); });
        document.getElementById('f-movie').classList.add('on');
        goTo('home');
        break;
    }
  });
  document.addEventListener('keydown',     function(){ document.body.classList.add('keyboard-nav'); });
  document.addEventListener('touchstart',  function(){ document.body.classList.remove('keyboard-nav'); });
  document.addEventListener('mousedown',   function(){ document.body.classList.remove('keyboard-nav'); });
})();

// ── TRIPLE CLICK en "STOP SCROLLING" → DEV MODE ──────────────
var _devClicks = 0, _devTimer;
function devTrigger(e) {
  clearTimeout(_devTimer);
  _devClicks++;
  _devTimer = setTimeout(function(){ _devClicks = 0; }, 800);
  if (_devClicks >= 3) {
    _devClicks = 0;
    paid = true;
    usageCount = 0;
    var t = document.getElementById('dev-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'dev-toast';
      t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#FFC700;font-size:13px;font-weight:700;letter-spacing:.05em;padding:8px 18px;border-radius:20px;z-index:9999;pointer-events:none;transition:opacity .4s';
      document.body.appendChild(t);
    }
    t.textContent = '🔓 Dev mode ON';
    t.style.opacity = '1';
    clearTimeout(t._hide);
    t._hide = setTimeout(function(){ t.style.opacity = '0'; }, 2500);
    setTimeout(function(){ goTo('home'); }, 400);
  }
}
document.getElementById('dev-trigger').addEventListener('click', devTrigger);

// ── SERVICE WORKER ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  });
}
</script>
